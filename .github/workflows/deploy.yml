name: PHP Deploy

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Deploy

        uses: appleboy/ssh-action@v1.2.0

        with:

          host: ${{ secrets.SERVER_HOST }}

          username: ${{ secrets.SERVER_USER }}

          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |

            cd /var/www/html/apps/learning

            git fetch origin

            git reset --hard origin/main
